<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Check</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        .info {
            background: #2a2a2a;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .label {
            color: #888;
            font-weight: bold;
        }
        .value {
            color: #4af;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <h1>Background Style Inspector</h1>
    <div id="results"></div>

    <script>
        // 等待页面加载完成
        setTimeout(() => {
            const iframe = document.createElement('iframe');
            iframe.src = 'http://127.0.0.1:38080';
            iframe.style.display = 'none';
            document.body.appendChild(iframe);

            iframe.onload = () => {
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                const html = iframeDoc.documentElement;
                const body = iframeDoc.body;
                const main = iframeDoc.querySelector('main');
                
                const htmlStyles = window.getComputedStyle(html);
                const bodyStyles = window.getComputedStyle(body);
                const mainStyles = main ? window.getComputedStyle(main) : null;

                const results = document.getElementById('results');
                
                results.innerHTML = `
                    <div class="info">
                        <h2>&lt;html&gt; Element</h2>
                        <div><span class="label">background:</span><span class="value">${htmlStyles.background}</span></div>
                        <div><span class="label">background-color:</span><span class="value">${htmlStyles.backgroundColor}</span></div>
                        <div><span class="label">background-image:</span><span class="value">${htmlStyles.backgroundImage}</span></div>
                        <div><span class="label">background-attachment:</span><span class="value">${htmlStyles.backgroundAttachment}</span></div>
                        <div><span class="label">background-size:</span><span class="value">${htmlStyles.backgroundSize}</span></div>
                    </div>

                    <div class="info">
                        <h2>&lt;body&gt; Element</h2>
                        <div><span class="label">background:</span><span class="value">${bodyStyles.background}</span></div>
                        <div><span class="label">background-color:</span><span class="value">${bodyStyles.backgroundColor}</span></div>
                        <div><span class="label">background-image:</span><span class="value">${bodyStyles.backgroundImage}</span></div>
                        <div><span class="label">background-attachment:</span><span class="value">${bodyStyles.backgroundAttachment}</span></div>
                        <div><span class="label">font-family:</span><span class="value">${bodyStyles.fontFamily}</span></div>
                    </div>

                    ${mainStyles ? `
                    <div class="info">
                        <h2>&lt;main&gt; Element</h2>
                        <div><span class="label">background:</span><span class="value">${mainStyles.background}</span></div>
                        <div><span class="label">background-color:</span><span class="value">${mainStyles.backgroundColor}</span></div>
                        <div><span class="label">background-image:</span><span class="value">${mainStyles.backgroundImage}</span></div>
                        <div><span class="label">background-attachment:</span><span class="value">${mainStyles.backgroundAttachment}</span></div>
                        <div><span class="label">min-height:</span><span class="value">${mainStyles.minHeight}</span></div>
                    </div>
                    ` : ''}
                `;
            };
        }, 1000);
    </script>
</body>
</html>
